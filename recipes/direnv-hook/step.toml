# Hook direnv into zsh (per-directory environments via .envrc) with a
# kitout-managed ~/.zshrc block. Only the region between the markers is managed —
# the rest of your ~/.zshrc is yours. Requires the `direnv` binary on PATH
# (brew "direnv"). The hook line must come LAST in .zshrc — see the README.
# needs: if direnv isn't already installed, add needs = ["<your package step>"].
[[step]]
type = "block-in-file"
id = "direnv-hook"
target = "~/.zshrc"
marker = "recipes:direnv"
block = '''
eval "$(direnv hook zsh)"
'''
