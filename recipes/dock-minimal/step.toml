# A minimal, out-of-the-way Dock: auto-hide with no reveal delay, no "recent
# applications" section, small tiles. Uses kitout's `defaults` step — no script,
# no privilege. The Dock is restarted only if a key actually changed.
[[step]]
type = "defaults"
id = "dock-minimal"
kill = ["Dock"]
write = [
  { domain = "com.apple.dock", key = "autohide",       value = true },  # hide the Dock until you push into it
  { domain = "com.apple.dock", key = "autohide-delay", value = 0 },     # reveal instantly (no hover delay)
  { domain = "com.apple.dock", key = "show-recents",   value = false }, # drop the "recent applications" section
  { domain = "com.apple.dock", key = "tilesize",       value = 40 },    # smaller icons (default is ~48–64)
]
