# Configure bat's theme and make it the man-page pager, in a kitout-managed
# ~/.zshrc block. Only the region between the markers is managed — the rest of
# your ~/.zshrc is yours. Requires the `bat` binary on PATH (brew "bat").
# needs: if bat isn't already installed, add needs = ["<your package step>"].
[[step]]
type = "block-in-file"
id = "bat-config"
target = "~/.zshrc"
marker = "recipes:bat-config"
block = '''
export BAT_THEME="ansi"
export MANPAGER="sh -c \"col -bx | bat -l man -p\""
export MANROFFOPT="-c"
'''
