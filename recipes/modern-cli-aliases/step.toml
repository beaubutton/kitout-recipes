# Modern-CLI aliases in a kitout-managed ~/.zshrc block. Only the region between
# the markers is managed — the rest of your ~/.zshrc is yours. Requires the tools
# you alias to: brew "eza", "bat", "ripgrep", "fd". Trim to what you actually install.
[[step]]
type = "block-in-file"
id = "modern-cli-aliases"
target = "~/.zshrc"
marker = "recipes:aliases"
block = '''
alias ls='eza --icons'
alias ll='eza -lah --icons --git'
alias la='eza -a --icons'
alias lt='eza --tree --level=2 --icons'
alias cat='bat --paging=never'
alias grep='rg'
alias find='fd'
'''
