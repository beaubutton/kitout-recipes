# Install bun — the fast all-in-one JavaScript runtime, package manager, bundler,
# and test runner — if it's missing. `command-if-missing` probes `bun` on PATH and,
# only when absent, runs the installer argv (spawned directly, no shell). Swap the
# installer if you prefer a pinned version or a non-Homebrew source.
[[step]]
type = "command-if-missing"
id = "bun"
probe = "bun"
install = ["brew", "install", "oven-sh/bun/bun"]
