# Set up pyenv: install the shell hook (managed block in ~/.zshrc) and a default
# CPython 3.x as the global version. Requires the `pyenv` binary already on PATH
# (brew "pyenv"). No privilege. Compiling CPython pulls in build deps — see README.
# needs: add needs = ["<your pyenv install step>"] so this runs after pyenv is present.
#
# check: satisfied once `pyenv global` reports a 3.x version (not "system"/unset).
# Read-only: it only queries pyenv's configured global, it never installs.
[[step]]
type = "script"
id = "pyenv"
path = "steps/pyenv.sh"
check = ["sh", "-c", "command -v pyenv >/dev/null 2>&1 && pyenv global 2>/dev/null | head -n1 | grep -q '^3\\.'"]
